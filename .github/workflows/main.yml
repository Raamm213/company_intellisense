name: Advanced CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      run_full_validation:
        description: 'Run the huge 700+ LLM Validation suite (Requires API Keys)'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: 🎨 Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort
          
      - name: Run Black Code Formatter
        run: black --check . || (echo "Black formatting failed! Run 'black .' locally." && exit 1)
        
      - name: Run isort Import Sorter
        run: isort --check-only --profile black . || (echo "isort failed! Run 'isort .' locally." && exit 1)
        
      - name: Run Flake8 Linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # We only check for critical syntax errors and undefined names by default to avoid failing on stylistic issues

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          
      - name: Run Bandit (Code Vulnerabilities)
        run: bandit -r . -ll -ii
        # -ll means low or medium severity issues only warn; high fails.

  test:
    name: 🧪 Unit Tests & Coverage
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
          
      - name: Run Unit Tests with Coverage
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing
          
      - name: Upload Coverage to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          
      - name: Run Extensive Validation (Manual Trigger Only)
        if: ${{ github.event.inputs.run_full_validation == 'true' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAIR_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd validation/validation
          pytest tests_generated/ -q

  docker:
    name: 🐳 Docker Build & Publish
    needs: [test, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
